<!DOCTYPE html>
<html>
<head>
    <title>Contact - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="card glass"></div>
<div id="progress"></div>

<header>
    <div class="nav">
        <h2>Portfolio</h2>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="project.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>

        <button onclick="toggleTheme()">Theme</button>
        <button onclick="login()">Admin Login</button>
    </div>
</header>

<section id="contact" >

    <h1>Contact Me</h1>
    <p style="color:#cbd5e1;">Let’s connect </p>

    <!-- FORM -->
    <div class="contact-box">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="message" placeholder="Your Message"></textarea>

        <button onclick="sendMessage()">Send Message</button>
        <p id="status"></p>

        <!-- ✅ WhatsApp Button -->
        <a href="https://wa.me/919103932328" target="_blank" class="whatsapp-btn">
            Chat on WhatsApp
        </a>
    </div>

    <!-- INFO -->
    <div class="contact-info">
        <div class="card">
            <p><strong>Phone:</strong> +91-9103932328</p>
            <p><strong> Email:</strong> shivangini.g25@gmail.com</p>
        </div>

        <div class="card">
            <a href="https://github.com/Shivanginigupta25" target="_blank">GitHub</a>
        <a href="https://linkedin.com/shivangini-g25" target="_blank">LinkedIn</a>
        </div>
    </div>

</section>

<script src="script.js"></script>

<script>
function sendMessage() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;
    let status = document.getElementById("status");

    if (!name || !email || !message) {
        status.innerText = "⚠️ Fill all fields";
        return;
    }

    fetch("/contact", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, email, message })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            status.innerText = "✅ Message sent!";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("message").value = "";
        } else {
            status.innerText = "❌ Failed to send";
        }
    })
    .catch(() => {
        status.innerText = "❌ Server error";
    });
}
</script>

</body>
</html>
