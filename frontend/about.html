<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card glass"></div>
<div id="progress"></div>

<header>
    <div class="nav">
        <h2>Portfolio</h2>
        <div>
            <a href="index.html">Home</a>
            <a href="about.html" class="active">About</a>
            <a href="project.html">Projects</a>
            <a href="contact.html">Contact</a>
            <button onclick="toggleTheme()">Theme</button>
            
        </div>
    </div>
</header>

<!-- ABOUT -->
<section id="about">
<div class="container">

    <h1>About Me</h1>
    <p id="typing"></p>

    <!-- WHAT I DO -->
    <div id="whatido">
        <h2>What I Do</h2>

        <div class="owner-only">
            <input id="wd1title" placeholder="Title 1">
            <input id="wd1desc" placeholder="Description 1">

            <input id="wd2title" placeholder="Title 2">
            <input id="wd2desc" placeholder="Description 2">

            <input id="wd3title" placeholder="Title 3">
            <input id="wd3desc" placeholder="Description 3">

            <button onclick="saveWhatIDo()">Save</button>
        </div>

        <div class="row" id="whatido-content"></div>
    </div>

<div class="about-left">

    <div class="edu-lang-flex">

        <!-- EDUCATION -->
        <div class="edu-card">
            <h3>🎓 Education</h3>
            <p class="highlight">BCA - Computer Applications</p>
            <span class="edu-tag">Student</span>
        </div>

        <!-- LANGUAGES -->
        <div class="lang-box">
            <h3>🌍 Languages</h3>
            <div class="lang-tags">
                <span>English</span>
                <span>Hindi</span>
            </div>
        </div>

    </div>

</div>
    <!-- RIGHT SIDE -->
    <div class="about-right">
        <h3>💻 My Skills</h3>

        <div class="owner-only skill-box">
            <input type="text" id="skillInput" placeholder="Add skill">
            <button onclick="addSkill()">Add</button>
        </div>

        <div id="skills" class="skills"></div>
    </div>

</div>

</section>

<script>
let text = "I am a BCA student passionate about coding and web development.";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();
</script>

<script src="script.js"></script>
</body>
</html>
